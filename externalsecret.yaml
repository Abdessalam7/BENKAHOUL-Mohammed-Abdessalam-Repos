{{- if .Values.vault.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.imagePullSecretName | default "pysmoke-secret" }}
  labels:
    app.kubernetes.io/name: {{ include "pysmoke-helm.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  refreshInterval: {{ .Values.vault.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.vault.secretStoreName | default "vault-store" }}
    kind: {{ .Values.vault.secretStoreKind | default "SecretStore" }}
  target:
    name: {{ .Values.imagePullSecretName | default "pysmoke-secret" }}
    creationPolicy: Owner
    type: kubernetes.io/dockerconfigjson
    template:
      data:
        .dockerconfigjson: |-
          {{ printf "{\"auths\":{\"%s\":{\"auth\":\"%s\"}}}" ( .server | toString ) ( printf "%s:%s" .username .password | b64enc ) | b64enc }}
  data:
    - secretKey: server
      remoteRef:
        key: {{ .Values.vault.kv.path | default "secret/registry/icr" }}
        property: server
    - secretKey: username
      remoteRef:
        key: {{ .Values.vault.kv.path | default "secret/registry/icr" }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.vault.kv.path | default "secret/registry/icr" }}
        property: password
{{- end }}
